services:
  test-runner:
    build:
      dockerfile: Dockerfile.test.dev
    env_file:
      - ../../.env
    environment:
      - SERVICE_URL=http://fastapi:8000
      - ES_ID_FIELD=id
      - ES_INDEX_MAPPING=/app/testdata/es_mapping.py
      - PYTHONPATH=/app/functional
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    command: pytest -v /app/functional
    volumes:
      - ./:/app/functional

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"yellow\"\\|\"status\":\"green\"' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - es-test-data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    volumes:
      - redis-test-data:/data

  fastapi:
    build:
      context: ../../fastapi
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ../../fastapi/src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  es-test-data:
  redis-test-data:
