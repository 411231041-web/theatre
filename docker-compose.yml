services:
  service:
    build:
      context: django-admin
    volumes:
      - static_volume:/var/www/static
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      theatre-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.socket(); s.settimeout(1); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs:/etc/nginx/conf.d:ro
      - static_volume:/var/www/static:ro
    depends_on:
      service:
        condition: service_healthy
      etl-films:
        condition: service_healthy
    ports:
      - "80:80"

  theatre-db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - ./database_dump.sql:/docker-entrypoint-initdb.d/init.sql
      - theatre-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1 -p ${SQL_PORT} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.6.2
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"yellow\"\\|\"status\":\"green\"' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  etl-films:
    build:
      context: .
      dockerfile: ./etl/Dockerfile
    env_file:
      - .env
    environment:
      - ETL_STATE_FILE=/state/etl_films_state.json
    volumes:
      - ./etl/postgres_to_es:/app/postgres_to_es
      - etl-state:/state
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /state"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  etl-genres:
    build:
      context: .
      dockerfile: ./etl/Dockerfile
    env_file:
      - .env
    environment:
      - ETL_STATE_FILE=/state/etl_genres_state.json
    volumes:
      - ./etl/postgres_to_es:/app/postgres_to_es
      - etl-state:/state
    command: ["python", "-m", "postgres_to_es.genres_main"]
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /state"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  etl-persons:
    build:
      context: .
      dockerfile: ./etl/Dockerfile
    env_file:
      - .env
    environment:
      - ETL_STATE_FILE=/state/etl_persons_state.json
    volumes:
      - ./etl/postgres_to_es:/app/postgres_to_es
      - etl-state:/state
    command: ["python", "-m", "postgres_to_es.persons_main"]
    depends_on:
      theatre-db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /state"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  static_volume:
  theatre-db-data:
  elasticsearch-data:
  etl-state:
  redis-data:


